<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Editor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="prizes-editor.css">
    <link rel="stylesheet" href="events-editor.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Events Editor</h1>
            <p class="header-desc">Customize events and their rewards for your tournament</p>
            <div class="editor-actions">
                <a href="index.html" class="btn btn-secondary">← Back to Planner</a>
                <button id="saveEventsBtn" class="btn btn-primary">💾 Save Changes</button>
                <button id="resetEventsBtn" class="btn btn-danger">🔄 Reset to Defaults</button>
            </div>
        </header>

        <main>
            <!-- Scheduled Side Events -->
            <section class="editor-section">
                <h2>📅 Scheduled Side Events</h2>
                <div class="editor-controls">
                    <button id="addScheduledBtn" class="btn btn-secondary">+ Add Event</button>
                </div>
                <div class="events-list" id="scheduledList">
                    <!-- Scheduled events will be loaded here -->
                </div>
            </section>

            <!-- On-Demand Side Events -->
            <section class="editor-section">
                <h2>🎮 On-Demand Side Events</h2>
                <div class="editor-controls">
                    <button id="addOnDemandBtn" class="btn btn-secondary">+ Add Event</button>
                </div>
                <div class="events-list" id="ondemandList">
                    <!-- On-demand events will be loaded here -->
                </div>
            </section>
        </main>

        <footer>
            <div class="editor-actions">
                <a href="index.html" class="btn btn-secondary">← Back to Planner</a>
                <button id="saveEventsBtn2" class="btn btn-primary">💾 Save Changes</button>
                <button id="resetEventsBtn2" class="btn btn-danger">🔄 Reset to Defaults</button>
            </div>
        </footer>
    </div>

    <script src="events-editor.js"></script>
</body>
</html>
